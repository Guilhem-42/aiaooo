<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Méduse - Shader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

        if (!gl) {
            alert('WebGL n\'est pas supporté par votre navigateur');
            throw new Error('WebGL not supported');
        }

        // Vertex shader (simple passthrough)
        const vertexShaderSource = `
            attribute vec2 position;
            void main() {
                gl_Position = vec4(position, 0.0, 1.0);
            }
        `;

        // Fragment shader - Méduse
        const fragmentShaderSource = `
            precision highp float;
            uniform vec2 iResolution;
            uniform float iTime;

            void main() {
                vec2 FC = gl_FragCoord.xy;
                vec2 r = iResolution;
                float t = iTime;
                vec4 o = vec4(0.0);

                // Shader "Meduse" original
                for(float i = 0.0, z = fract(dot(FC, sin(FC))), d; i < 1e2; i++) {
                    vec3 p = z * normalize(vec3(FC.xy * 2.0 - r.xy, 0.0));
                    p.z += 6.0;
                    for(d = 1.0; d < 9.0; d /= 0.8) {
                        p += cos(p.yzx * d - t) / d;
                    }
                    z += d = 0.002 + abs(length(p) - 0.5) / 4e1;
                    o += (sin(z - t + vec4(6, 2, 4, 0)) + 1.5) / d;
                }
                o = tanh(o / 7e3);

                gl_FragColor = o;
            }
        `;

        // Fonction pour compiler un shader
        function compileShader(source, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);

            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Erreur de compilation du shader:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }

            return shader;
        }

        // Créer le programme shader
        const vertexShader = compileShader(vertexShaderSource, gl.VERTEX_SHADER);
        const fragmentShader = compileShader(fragmentShaderSource, gl.FRAGMENT_SHADER);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Erreur de liaison du programme:', gl.getProgramInfoLog(program));
        }

        gl.useProgram(program);

        // Créer un quad plein écran
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
            -1, -1,
             1, -1,
            -1,  1,
             1,  1
        ]), gl.STATIC_DRAW);

        const positionLocation = gl.getAttribLocation(program, 'position');
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        // Uniforms
        const iResolutionLocation = gl.getUniformLocation(program, 'iResolution');
        const iTimeLocation = gl.getUniformLocation(program, 'iTime');

        // Fonction de redimensionnement
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }

        window.addEventListener('resize', resize);
        resize();

        // Boucle d'animation
        let startTime = Date.now();

        function render() {
            const currentTime = (Date.now() - startTime) * 0.001; // Temps en secondes

            gl.uniform2f(iResolutionLocation, canvas.width, canvas.height);
            gl.uniform1f(iTimeLocation, currentTime);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
